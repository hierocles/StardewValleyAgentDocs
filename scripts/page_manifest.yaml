# Routes Modding wiki pages (flattened filenames) to docs/ output paths.
# Wiki title "Modding:Weather data" -> flat file "Modding_Weather_data.md"

merge_only:
  - "Modding:Modder Guide/header"
  - "Modding:Content Patcher/header"
  - "Modding:Console commands/cmd"
  - "Modding:Modder Guide/APIs/Events/event"
  - "Modding:Mod compatibility/entry"
  - "Modding:Mod compatibility/barchart"
  - "Modding:Community/entry"

index_page: "Modding:Index"

missing_from_export:
  - "Modding:Migrate to SMAPI 2.0"
  - "Modding:Migrate to Stardew Valley 1.3"
  - "Modding:Migrate XNB changes to Stardew Valley 1.3"
  - "Modding:Migrate to Stardew Valley 1.3.36"
  - "Modding:Migrate to Stardew Valley 1.4"
  - "Modding:Migrate to SMAPI 3.0"
  - "Modding:Migrate to Stardew Valley 1.5"
  - "Modding:Migrate to Stardew Valley 1.5.5"
  - "Modding:Migrate to SMAPI 4.0"
  - "Modding:Migrate to Stardew Valley 1.6"
  - "Modding:Migrate to Stardew Valley 1.6.9"
  - "Modding:Migrate to Stardew Valley 1.6.16"
  - "Modding:Migrate to Stardew Valley 1.7"
  - "Modding:Museum"
  - "Modding:Editing XNB files"
  - "Modding:Using XNB mods"

# wiki_title -> output path(s). Use splits for large pages (section markers are == headings in markdown).
pages:
  "Modding:Index":
    emit: readme_source

  "Modding:Player Guide/Getting Started":
